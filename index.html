<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأجمل خلود ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff0f5;
overflow-x:hidden;
}

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8fc7,#ffd8e8);
}

.login{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.15);
}

input{
padding:12px;
width:250px;
margin-top:10px;
border-radius:10px;
border:none;
background:#eee;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff4d88;
color:white;
font-size:18px;
cursor:pointer;
}

#content{
display:none;
}

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.section img{
width:90%;
max-width:450px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

.caption{
margin-top:15px;
font-size:30px;
font-weight:bold;
color:#ff4d88;
}

.final{
padding:50px;
text-align:center;
font-size:30px;
color:#ff4d88;
font-weight:bold;
}

#kiss{
display:none;
font-size:35px;
text-align:center;
padding:40px;
color:#ff4d88;
}

.flower{
position:fixed;
top:-50px;
font-size:30px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>

<body>

<div id="loginPage">
<div class="login">
<h2>❤️ لأجمل خلود ❤️</h2>
<p>اكتبي الباسورد</p>
<input type="password" id="pass">
<br>
<button onclick="login()">دخول</button>
<p id="error"></p>
</div>
</div>

<div id="content">

<div class="section">
<img src="YOUR_IMAGE_1">
<div class="caption">بحبك ❤️</div>
</div>

<div class="section">
<img src="YOUR_IMAGE_2">
<div class="caption">مفيش فحلاوتك 🌹</div>
</div>

<div class="section">
<img src="YOUR_IMAGE_3">
<div class="caption">أجمل بنوتة 💕</div>
</div>

<div class="section">
<img src="YOUR_IMAGE_4">
<div class="caption">شكل تحفة 😍</div>
</div>

<div class="section">
<img src="YOUR_IMAGE_5">
<div class="caption">إنتي وبس ومفيش زيك ❤️</div>
</div>

<div class="final">
انتي مش أحلى بنت فالدنيا ❤️<br>
بس أحلى بنت في عيني ❤️
</div>

<div style="text-align:center;padding-bottom:50px;">
<button onclick="showKiss()">اضغطي هنا ❤️</button>
</div>

<div id="kiss">
💋💋💋<br><br>
أحلى خلود فالدنيا ❤️<br>
فداكي الدنيا بناسها اللي فيها ❤️
</div>

</div>

<script>

function login(){

if(document.getElementById("pass").value==="habebte"){

document.getElementById("loginPage").style.display="none";
document.getElementById("content").style.display="block";

for(let i=0;i<80;i++){

let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌹";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(f);

setTimeout(()=>{
f.remove();
},7000);
}

}else{
document.getElementById("error").innerHTML="الباسورد غلط 😢";
}

}

function showKiss(){
document.getElementById("kiss").style.display="block";
}

</script>

</body>
</html>
